<!DOCTYPE html>
<html lang="en">
<head>
    <title>Event Announcement System</title>
    <style>
        body { font-family: Arial; max-width: 600px; margin: 50px auto; padding: 20px; background: #f5f5f5; }
        .container { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 2px 20px rgba(0,0,0,0.1); }
        h1 { color: #232F3E; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; }
        button { width: 100%; background: #232F3E; color: white; padding: 14px; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; }
        button:hover { background: #FF9900; }
        .badge { text-align: center; margin-top: 15px; color: #999; font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Event Announcement System</h1>
        <p>Send announcements to all subscribers instantly via AWS SNS</p>
        <input type="text" id="title" placeholder="Event Title" />
        <textarea id="message" rows="4" placeholder="Event Description"></textarea>
        <input type="email" id="email" placeholder="Your Email" />
        <button onclick="send()">Send Announcement</button>
        <div id="status"></div>
        <div class="badge">Powered by AWS Lambda + SNS + API Gateway + S3</div>
    </div>
    <script>
        async function send() {
            const res = await fetch('YOUR_API_URL/announce', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    title: document.getElementById('title').value,
                    message: document.getElementById('message').value,
                    email: document.getElementById('email').value
                })
            });
            const data = await res.json();
            document.getElementById('status').innerHTML = data.message;
        }
    </script>
</body>
</html>
